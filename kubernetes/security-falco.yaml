# ---- Falco Runtime Security (DaemonSet) ----
# Note: Typically installed via Helm, this is a placeholder for the strategy.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: falco
  namespace: kube-system
  labels:
    app.kubernetes.io/name: falco
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: falco
  template:
    metadata:
      labels:
        app.kubernetes.io/name: falco
    spec:
      serviceAccountName: falco
      containers:
        - name: falco
          image: falcosecurity/falco:latest
          # checkov:skip=CKV_K8S_16: "Falco requires privileged access for syscall monitoring"
          securityContext:
            privileged: true # Required for syscall monitoring
          args: ["/usr/bin/falco", "-K", "/etc/falco/falco.yaml"]
