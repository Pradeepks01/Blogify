# ---- AWS ALB Ingress Controller ----
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: blogify-ingress
  namespace: blogify
  annotations:
    # Use AWS Application Load Balancer
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    # Cost-optimized: Path-based routing to share one ALB
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    # Security: SSL/TLS termination would go here
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:xxx:certificate/xxx
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: blogify-backend
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: blogify-frontend
                port:
                  number: 80
