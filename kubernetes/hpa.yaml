# ---- Horizontal Pod Autoscaler for Backend ----
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: blogify-backend-hpa
  namespace: blogify
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: blogify-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# ---- Horizontal Pod Autoscaler for Frontend ----
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: blogify-frontend-hpa
  namespace: blogify
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: blogify-frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
