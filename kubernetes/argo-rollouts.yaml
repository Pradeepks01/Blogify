# ---- Argo Rollouts Strategy (Canary) ----
# Note: Requires Argo Rollouts controller to be installed in the cluster.
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: blogify-backend-rollout
  namespace: blogify
spec:
  replicas: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: blogify-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: blogify-backend
    spec:
      containers:
      - name: backend
        image: ghcr.io/pradeepks01/blogify-backend:latest
        ports:
        - containerPort: 5000
  strategy:
    canary:
      steps:
      - setWeight: 20
      - pause: { duration: 10m }
      - setWeight: 50
      - pause: { duration: 10m }
